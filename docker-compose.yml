version: '3.9' 
services: 
  web_gl: 
      build: . 
      container_name: django_app_gl
      command: python manage.py runserver 0.0.0.0:8000 
      volumes: 
         - ./:/app 
      ports: 
         - "8003:8000" 
      env_file: 
          - .env 
      depends_on:
       - db_gl 
      networks: 
      - django_network_gl
  db_gl: 
      image: postgres:16 
      container_name: postgres_db_gl
      
      environment: 
        POSTGRES_DB: django_db 
        POSTGRES_USER: django_user 
        POSTGRES_PASSWORD: django_password 
      volumes: 
         - postgres_data_gl:/var/lib/postgresql/data 
      ports: 
        - "5435:5432" 
      networks: 
        - django_network_gl 
volumes: 
      postgres_data_gl:
networks: 
django_network_gl:
